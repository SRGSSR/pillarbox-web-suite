version: 2
updates:
  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      action-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # --- NPM ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    # Internal workspace packages are versioned by semantic-release, video.js is
    # manually updated.
    ignore:
      - dependency-name: "@srgssr/*"
      - dependency-name: "video.js"
    groups:
      node-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
